<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a; color: #f8fafc; font-family: 'Outfit', sans-serif;
            min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 50px; text-align: center; max-width: 400px;
            animation: zoomIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .icon { font-size: 60px; margin-bottom: 20px; animation: pulse 2s infinite; display: inline-block; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        h1 { margin: 0 0 15px 0; color: #10b981; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            display: inline-block; padding: 14px 30px; border-radius: 12px;
            background: #38bdf8; color: #0f172a; text-decoration: none; font-weight: 800;
            transition: all 0.3s;
        }
        .btn:hover { background: #7dd3fc; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✨</div>
        <h1>Analysis Complete</h1>
        <p>Our AI has successfully read and scored your resume. You are now in the system ranking.</p>
        <a href="{% url 'interview_session:room' %}" class="btn">Start Interview Room</a>
    </div>
</body>
</html>
